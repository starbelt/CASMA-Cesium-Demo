<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Satellite from Ground Station</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.133/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.133/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <script src="https://unpkg.com/satellite.js/dist/satellite.min.js"></script> <!-- satellite, used for propogation -->
  <style>
    html, body, #cesiumContainer {
      width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <script type="module">
    const viewer = new Cesium.Viewer("cesiumContainer", {
      shouldAnimate: true,
      terrain: Cesium.Terrain.fromWorldTerrain(),
      infoBox: false,
      selectionIndicator: false
    });

    // Fly camera to Blacksburg looking up
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(-80.419, 37.207, 700), // abt surface level
      orientation: {
        heading: Cesium.Math.toRadians(0),  
        pitch: Cesium.Math.toRadians(90),   
        roll: Cesium.Math.toRadians(90)
      } 
    });

    // Add ground station marker
    viewer.entities.add({
      name: "Ground Station",
      position: Cesium.Cartesian3.fromDegrees(-80.419, 37.207, 640),
      point: { pixelSize: 10, color: Cesium.Color.Cyan },
      label: {
        text: "Blacksburg",
        font: "14px sans-serif",
        fillColor: Cesium.Color.Cyan,
        showBackground: true,
        backgroundColor: new Cesium.Color(0.1, 0.1, 0.1, 0.7),
        pixelOffset: new Cesium.Cartesian2(0, -20)
      }
    });

    /*
    // Add Static Test Satellite marker
    viewer.entities.add({
      name: "Satellite",
      position: Cesium.Cartesian3.fromDegrees(-80.419, 37.207, 7000000),
      point: { pixelSize: 10, color: Cesium.Color.Cyan },
      label: {
        text: "Satellite",
        font: "14px sans-serif",
        fillColor: Cesium.Color.Cyan,
        showBackground: true,
        backgroundColor: new Cesium.Color(0.1, 0.1, 0.1, 0.7),
        pixelOffset: new Cesium.Cartesian2(0, -20)
      }
    });
    */

    // Example TLEs
    const tleData = [
      {
        name: "SAT1",
        tle1: "1 54321U 25001E   25248.50000000  .00000000  00000-0  00000+0 0  9991",
        tle2: "2 54321  53.0000  53.0000 0001500  00.0000 360.0000 15.05500000 00005",
        color: Cesium.Color.YELLOW
      },
      {
        name: "SAT2",
        tle1: "1 54321U 25001E   25248.50000000  .00000000  00000-0  00000+0 0  9991",
        tle2: "2 54321  45.0000  55.0000 0001500  00.0000 40.0000 13.05500000 00005",
        color: Cesium.Color.YELLOW
      }
    ];

    // Convert ECI (km) → Cesium Cartesian3 ECEF (m)
    function eciToCesium(eci, gmst) {
      const ecf = satellite.eciToEcf(eci, gmst);
      return new Cesium.Cartesian3(
        ecf.x * 1000,
        ecf.y * 1000,
        ecf.z * 1000
      );
    }

    // Create dynamic satellite entity
    function createSatelliteEntity(satrec, name, color, start) {
      const position = new Cesium.SampledPositionProperty();
      const stop = Cesium.JulianDate.addHours(start, 2, new Cesium.JulianDate());

      // Sample positions every minute for 2 hours
      for (let i = 0; i <= 120; i++) {
        const time = Cesium.JulianDate.addMinutes(start, i, new Cesium.JulianDate());
        const jsDate = Cesium.JulianDate.toDate(time);

        const pv = satellite.propagate(
          satrec,
          jsDate.getUTCFullYear(),
          jsDate.getUTCMonth() + 1,
          jsDate.getUTCDate(),
          jsDate.getUTCHours(),
          jsDate.getUTCMinutes(),
          jsDate.getUTCSeconds()
        );

        if (pv.position) {
          const gmst = satellite.gstime(jsDate);
          const pos = eciToCesium(pv.position, gmst);
          position.addSample(time, pos);
        }
      }

      position.setInterpolationOptions({
        interpolationAlgorithm: Cesium.LagrangePolynomialApproximation,
        interpolationDegree: 5
      });

      return viewer.entities.add({
        name: name,
        availability: new Cesium.TimeIntervalCollection([
          new Cesium.TimeInterval({ start, stop })
        ]),
        position: position,
        point: { pixelSize: 10, color: color },
        label: {
          text: name,
          font: "14px sans-serif",
          fillColor: color,
          showBackground: true,
          backgroundColor: new Cesium.Color(0, 0, 0, 0.6),
          pixelOffset: new Cesium.Cartesian2(0, -20)
        },
        path: {
          show: true,
          leadTime: 0,
          trailTime: 600,
          width: 2,
          material: color
        }
      });
    }
    
    // Hard-coded UTC date: 2025-09-05 12:00:00 UTC (7:00 EST)
    const fixedDateUTC = new Date(Date.UTC(2025, 8, 5, 12, 10, 0));
    const start = Cesium.JulianDate.fromDate(fixedDateUTC);
    const stop = Cesium.JulianDate.addHours(start, 2, new Cesium.JulianDate());

    // Create entities from TLEs
    tleData.forEach(sat => {
      const satrec = satellite.twoline2satrec(sat.tle1, sat.tle2);
      createSatelliteEntity(satrec, sat.name, sat.color, start);
    });

    // Cesium clock
    viewer.clock.startTime = start.clone();
    viewer.clock.stopTime = stop.clone();
    viewer.clock.currentTime = start.clone();
    viewer.clock.clockRange = Cesium.ClockRange.LOOP_STOP;
    viewer.clock.multiplier = 30;
    viewer.timeline.zoomTo(start, stop);

  </script>
</body>
</html>
