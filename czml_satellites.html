<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Satellites CZML Viewer</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.133/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.133/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer {
      width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <script>
    // Initialize Cesium viewer
    const viewer = new Cesium.Viewer("cesiumContainer", {
      shouldAnimate: true
    });

    // Load the satellites CZML file found from Cesium's GitHub, called simple.czml
    // https://github.com/CesiumGS/cesium/blob/main/Apps/SampleData/simple.czml
    Cesium.CzmlDataSource.load("satellites.czml").then(dataSource => {
      viewer.dataSources.add(dataSource);

      // Fly to Earth first (default home view)
      viewer.camera.flyHome(2.0);
    });
  </script>
</body>
</html>
